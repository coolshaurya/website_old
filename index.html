<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Shaurya Shubham</title>
	<link rel="preconnect" href="https://fonts.gstatic.com">
	<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@1,700&text=Shaurya+Shubham&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet"> 

<style>
	* {
		box-sizing: border-box;
		margin: 0;
		padding: 0;
	}

	:root {
		--header-teal: #08bdba;
		--footer-grey: #a2a9b0;
		--main-grey: #f4f4f4;
		--text-color: #121619;
	}

	body, html {
		font-size: 20px;
		font-family: "IBM Plex Sans", serif;
		font-weight: 400;
		color: var(--text-color);
	}

	h1 {
		font-size: 3rem;
		font-family: "IBM Plex Serif", serif;
		font-weight: 700;
		font-style: italic;
		margin-bottom: 1.5rem;
	}

	h2 {
		font-size: 1.4rem;
		font-weight: 700;
	}

	header {
		text-align: center;
		background-color: var(--header-teal);
		padding: 3rem 1rem;
	}

	header p {
		font-size: 1.2rem;
	}

	main {
		background-color: var(--main-grey);
		
		/* top | horizontal | bottom */
		padding: 2rem 0 1rem;
	}

	main .container {
		min-width: 40ch;
		max-width: 60ch;
		margin: auto;
	}

	footer {
		font-size: 0.75rem;
		font-style: italic;
		padding: 0.5rem;
		padding-left: 1rem;
		background-color: var(--footer-grey);
	}
</style>
</head>
<body>
	<header>
		<h1> Shaurya Shubham </h1>
		<p>
			I am a programmer who mainly codes in Rust.
		</p>
	</header>
	<main>
		<div class="container">
			<section>
				<h2> About </h2>
			</section>
			<section>
				<h2> Contact </h2>
			</section>
		</div>
	</main>
	<footer>
		&copy; 2021 Shaurya Shubham. All Rights Reserved.
	</footer>
</body>
</html>
